name: CI (core tests + app debug)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init log files (so upload never fails)
        run: |
          : > core-compile.log
          : > core-test.log
          : > core-tasks.txt
          : > app-assemble.log

      - name: Setup Java 17 (Temurin) + Gradle cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # Wrapper-а нет — ставим Gradle дистрибутив прямо в раннер
      - name: Setup Gradle 8.13 (no wrapper)
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.13" # требуется текущей версией AGP

      - name: Setup Android SDK + packages
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 platforms;android-35 build-tools;34.0.0 build-tools;35.0.0"

      - name: Check toolchain versions
        run: |
          which java || true
          java -version
          which gradle || true
          gradle -v
          sdkmanager --list | head -n 50

      - name: Accept SDK licenses (best-effort)
        run: yes | sdkmanager --licenses || true

      - name: Core compile (adaptive, diagnostic)
        run: |
          set -eo pipefail
          TASKS="$(gradle :core:tasks --all)"
          echo "$TASKS" | sed -n '1,300p' > core-tasks.txt
          if   echo "$TASKS" | grep -qE '^compileKotlin[[:space:]]'; then CORE_COMPILE=":core:compileKotlin";
          elif echo "$TASKS" | grep -qE '^compileDebugKotlin[[:space:]]'; then CORE_COMPILE=":core:compileDebugKotlin";
          elif echo "$TASKS" | grep -qE '^compileReleaseKotlin[[:space:]]'; then CORE_COMPILE=":core:compileReleaseKotlin";
          else CORE_COMPILE=":core:build"; fi
          echo "Chosen core compile task: $CORE_COMPILE"
          gradle $CORE_COMPILE --console=plain --no-daemon --stacktrace --info 2>&1 | tee core-compile.log

      - name: Core unit tests (adaptive)
        if: success()
        run: |
          set -eo pipefail
          TASKS="$(gradle :core:tasks --all)"
          if   echo "$TASKS" | grep -qE '^test[[:space:]]'; then CORE_TEST=":core:test";
          elif echo "$TASKS" | grep -qE '^testDebugUnitTest[[:space:]]'; then CORE_TEST=":core:testDebugUnitTest";
          elif echo "$TASKS" | grep -qE '^testReleaseUnitTest[[:space:]]'; then CORE_TEST=":core:testReleaseUnitTest";
          else echo "No core unit test task found; skipping." | tee core-test.log; exit 0; fi
          echo "Chosen core test task: $CORE_TEST"
          gradle $CORE_TEST --console=plain --no-daemon --stacktrace --info 2>&1 | tee -a core-test.log

      - name: Assemble app (debug)
        if: success()
        run: |
          set -eo pipefail
          gradle :app:assembleDebug --console=plain --no-daemon --stacktrace --info 2>&1 | tee app-assemble.log
          ls -al app/build/outputs/apk/debug || true

      - name: Static analysis (ktlint)
        if: always()
        continue-on-error: true
        run: gradle ktlintCheck --console=plain --no-daemon --info | tee ktlint.log

      - name: Static analysis (detekt)
        if: always()
        continue-on-error: true
        run: gradle detekt --console=plain --no-daemon --info | tee detekt.log

      - name: Upload logs & reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-and-reports
          path: |
            core-compile.log
            core-test.log
            core-tasks.txt
            app-assemble.log
            ktlint.log
            detekt.log
            core/build/reports/**
            app/build/reports/**
          if-no-files-found: warn

      - name: Upload APK artifact (if exists)
        if: always() && hashFiles('app/build/outputs/apk/debug/app-debug.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
