name: CI (core tests + app debug)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17 (Temurin) + Gradle cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # Wrapper-а нет — ставим Gradle дистрибутив прямо в раннер
      - name: Setup Gradle 8.9 (no wrapper)
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.9" # >=8.7 для AGP 8.5.x

      - name: Setup Android SDK + packages
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Show versions
        run: |
          gradle -v
          sdkmanager --list | head -n 50

      - name: Core tests
        run: gradle :core:test --console=plain --no-daemon

      - name: Assemble app (debug)
        run: gradle :app:assembleDebug --console=plain --no-daemon

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
