name: CI (core tests + app debug)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17 (Temurin) + Gradle cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # Wrapper-а нет — ставим Gradle дистрибутив прямо в раннер
      - name: Setup Gradle 8.13 (no wrapper)
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.13" # требуется текущей версией AGP

      - name: Setup Android SDK + packages
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 platforms;android-35 build-tools;34.0.0 build-tools;35.0.0"

      - name: Init logs
        run: |
          : > env.log
          : > build.log
          : > tree.txt
          : > gradle-projects.txt
          : > gradle-settings.txt

      - name: Toolchain & repo snapshot
        shell: bash
        run: |
          {
            echo "=== PWD ==="; pwd
            echo "=== JAVA ==="; which java || true; java -version || true
            echo "=== GRADLE ==="; which gradle || true; gradle -v || true
            echo "=== settings.gradle.kts ==="; cat settings.gradle.kts || true
          } | tee -a env.log
          ( cat settings.gradle.kts 2>/dev/null | tee gradle-settings.txt ) || true
          sudo apt-get update >/dev/null 2>&1 || true
          sudo apt-get install -y tree >/dev/null 2>&1 || true
          ( tree -L 3 -a | tee tree.txt ) || true
          ( gradle projects --console=plain --no-daemon 2>&1 | tee gradle-projects.txt ) || true

      - name: Build core & app (single log)
        shell: bash
        run: |
          set -o pipefail
          gradle clean :core:test :app:assembleDebug --console=plain --no-daemon --stacktrace --info 2>&1 | tee -a build.log || true
          echo "EXIT_CODE=${PIPESTATUS[0]}" | tee -a env.log

      - name: Diagnose test compilation (core) — verbose
        shell: bash
        run: |
          set -o pipefail
          gradle :core:compileTestKotlin --console=plain --no-daemon --stacktrace --debug 2>&1 | tee core-compileTest.log || true

      - name: Decide status by log content
        id: decide
        shell: bash
        run: |
          FAIL=0
          grep -q "BUILD FAILED" build.log && FAIL=1
          grep -q "There were failing tests" build.log && FAIL=1
          echo "fail=$FAIL" >> $GITHUB_OUTPUT
          if [ "$FAIL" -eq 1 ]; then
            echo "::warning::Marked failed by log analysis"
          else
            echo "::notice::Marked success by log analysis"
          fi

      - name: Upload APK (if exists)
        if: hashFiles('app/build/outputs/apk/debug/app-debug.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Upload logs & reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-and-reports
          path: |
            env.log
            build.log
            core-compileTest.log
            tree.txt
            gradle-projects.txt
            gradle-settings.txt
            core/build/reports/**
            app/build/reports/**
          if-no-files-found: warn

      - name: Fail job if failed
        if: steps.decide.outputs.fail == '1'
        run: exit 1
